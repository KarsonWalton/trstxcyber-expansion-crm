<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Expansion CRM</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div class="sidebar">
            
            <div class="tabs">
                <button id="tab-search" class="tab active">Territory Finder</button>
                <button id="tab-saved" class="tab">My Clients</button>
            </div>

            <div id="view-search">
                <h2>Territory Finder</h2>
                
                <div class="input-group">
                    <label for="industry-input">Industry</label>
                    <input type="text" id="industry-input" placeholder="e.g., Plumbers, Solar, HVAC">
                </div>
                
                <div class="input-group">
                    <label for="location-input">Location</label>
                    <input type="text" id="location-input" placeholder="e.g., Irvine, Long Beach">
                </div>
                
                <button id="search-btn" class="search-button">Search Territory</button>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
                
                <div class="input-group">
                    <label for="status-filter">Filter by Status</label>
                    <select id="status-filter">
                        <option value="all">All Statuses</option>
                        <option value="Researching">Researching</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>

                <div id="results-container"></div>
            </div>

            <div id="view-saved" style="display: none;">
                <h2>Saved Businesses</h2>
                <div id="saved-container"></div>
            </div>

        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // If running locally, your local config.js file will have already loaded these.
        // If running on Vercel, Vercel will look for these strings and replace them with your real keys!
        window.SUPABASE_URL = window.SUPABASE_URL || "process.env.SUPABASE_URL";
        window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "process.env.SUPABASE_ANON_KEY";
    </script>
    
    <script src="config.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
